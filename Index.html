<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sigma Hub | Pro Light Edition</title>
    <!-- Google Fonts & modern reset -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #f8fafc;
            background-image: radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.03) 0%, rgba(255, 255, 255, 0) 80%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            color: #0f172a;
            overflow-x: hidden;
        }

        /* main container – glassmorphic light card effect */
        .glass-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 
                0 25px 45px -12px rgba(0, 0, 0, 0.08),
                0 1px 2px rgba(0, 0, 0, 0.02);
            padding: 2rem 1.8rem 2.5rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* smooth float animation for logo & title */
        @keyframes softFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        .title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e293b, #2d3a5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            animation: softFloat 3.5s ease-in-out infinite;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #475569;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: -0.2px;
            background: rgba(100, 116, 139, 0.1);
            display: inline-block;
            width: auto;
            margin: 0 auto 1.2rem;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        /* modern logo / sigma emblem */
        .sigma-emblem {
            display: flex;
            justify-content: center;
            margin: 1rem 0 1.2rem;
        }
        .logo-circle {
            width: 130px;
            height: 130px;
            background: linear-gradient(145deg, #ffffff, #f1f5f9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 20px 30px -12px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255,255,255,0.8);
            transition: all 0.25s ease;
            animation: softFloat 4s ease-in-out infinite;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .logo-circle:hover {
            transform: scale(1.02);
            box-shadow: 0 24px 36px -14px rgba(37, 99, 235, 0.2);
        }
        .sigma-symbol {
            font-size: 4.4rem;
            font-weight: 700;
            background: linear-gradient(125deg, #0f2b5e, #2563eb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-family: 'Inter', monospace;
            text-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* TikTok button – premium outline + glow */
        .btn-tiktok {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: #0f172a;
            border: none;
            padding: 0.9rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-bottom: 2rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(2px);
        }
        .btn-tiktok:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 14px 24px -10px rgba(15, 23, 42, 0.2);
        }
        .btn-tiktok:active {
            transform: translateY(1px);
        }

        /* Cards list – clean & interactive */
        .scripts-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 0.25rem;
        }

        .script-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 1.75rem;
            padding: 0.9rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.25s ease;
            border: 1px solid rgba(203, 213, 225, 0.5);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }
        .script-card:hover {
            transform: translateY(-3px);
            border-color: rgba(37, 99, 235, 0.3);
            box-shadow: 0 18px 28px -12px rgba(0, 0, 0, 0.08);
            background: white;
        }

        .script-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: #0f172a;
        }
        .script-icon {
            background: #eef2ff;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        .script-card:hover .script-icon {
            background: #d9e6ff;
            transform: scale(0.98);
        }
        .script-name {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        /* copy button premium */
        .copy-btn {
            background: linear-gradient(105deg, #ffffff, #f8fafc);
            border: 1px solid #cbd5e1;
            padding: 0.55rem 1.1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .copy-btn:hover {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.2);
            transform: translateY(-1px);
        }
        .copy-btn:active {
            transform: scale(0.96);
        }

        /* toast notification – modern light + blur */
        .toast-notify {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(12px);
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
            box-shadow: 0 12px 22px -10px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
            animation: fadeSlideUp 0.2s ease forwards;
            pointer-events: none;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(18px);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* decorative floating light orbs (minimal, pro) */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            z-index: -1;
            opacity: 0.3;
            pointer-events: none;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: #60a5fa;
            top: -100px;
            left: -80px;
        }
        .orb-2 {
            width: 400px;
            height: 400px;
            background: #c7d2fe;
            bottom: -120px;
            right: -100px;
        }

        /* responsive touch */
        @media (max-width: 500px) {
            body {
                padding: 1.2rem;
            }
            .glass-container {
                padding: 1.6rem 1.3rem 2rem;
            }
            .title {
                font-size: 2.3rem;
            }
            .logo-circle {
                width: 100px;
                height: 100px;
            }
            .sigma-symbol {
                font-size: 3.4rem;
            }
            .script-card {
                padding: 0.75rem 1rem;
            }
            .copy-btn {
                padding: 0.45rem 0.9rem;
            }
        }

        /* smooth footer micro */
        .footer-meta {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        hr {
            margin: 1rem 0 0.6rem;
            border: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #cbd5e1, transparent);
        }
    </style>
</head>
<body>

<!-- subtle background orbs for premium atmosphere -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="glass-container">
    <!-- Title & subtitle with light premium vibe -->
    <div class="title">Sigma Hub</div>
    <div style="text-align: center;">
        <div class="subtitle">✨ giao diện pro · light & mượt mà ✨</div>
    </div>

    <!-- Modern sigma logo (replaces broken image) -->
    <div class="sigma-emblem">
        <div class="logo-circle">
            <span class="sigma-symbol">Σ</span>
        </div>
    </div>

    <!-- TikTok button (enhanced) -->
    <button class="btn-tiktok" id="tiktokBtn">
        <span>📱</span> TikTok Channel <span style="opacity:0.7;">→</span>
    </button>

    <!-- Script list cards - professional interactive -->
    <div class="scripts-list">
        <!-- Script 1 card -->
        <div class="script-card">
            <div class="script-info">
                <div class="script-icon">⚡</div>
                <span class="script-name">Sigma Executor V1</span>
            </div>
            <button class="copy-btn" data-script="loadstring(game:HttpGet('https://sigma-hub.cloud/script/v1.lua'))()">
                📋 Copy
            </button>
        </div>

        <!-- Script 2 card -->
        <div class="script-card">
            <div class="script-info">
                <div class="script-icon">🚀</div>
                <span class="script-name">Pro Hub AI Core</span>
            </div>
            <button class="copy-btn" data-script="loadstring(game:HttpGet('https://sigma-hub.cloud/script/ai_core.lua'))()">
                📋 Copy
            </button>
        </div>

        <!-- Script 3 card -->
        <div class="script-card">
            <div class="script-info">
                <div class="script-icon">💎</div>
                <span class="script-name">Sigma Ultra+</span>
            </div>
            <button class="copy-btn" data-script="loadstring(game:HttpGet('https://sigma-hub.cloud/script/ultra_plus.lua'))()">
                📋 Copy
            </button>
        </div>
    </div>
    
    <div class="footer-meta">
        <hr>
        <span>⚡ nhấn copy — script tự động lưu clipboard</span>
    </div>
</div>

<script>
    (function() {
        // Professional toast system
        function showToast(message, duration = 1800) {
            // remove existing toast if any to avoid overlapping
            const existingToast = document.querySelector('.toast-notify');
            if(existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-notify';
            toast.textContent = message || '✓ Đã copy!';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                if(toast && toast.parentNode) toast.remove();
            }, duration);
        }
        
        // Clipboard copy function with fallback & user feedback
        async function copyToClipboard(text, buttonElement) {
            if(!text) return;
            try {
                await navigator.clipboard.writeText(text);
                // show toast with nice status
                showToast('✨ Đã copy script vào clipboard!', 1500);
                
                // optional micro animation on clicked button
                if(buttonElement) {
                    const originalText = buttonElement.innerHTML;
                    buttonElement.innerHTML = '✓ Copied!';
                    buttonElement.style.background = '#2563eb';
                    buttonElement.style.color = 'white';
                    buttonElement.style.borderColor = '#2563eb';
                    setTimeout(() => {
                        buttonElement.innerHTML = originalText;
                        buttonElement.style.background = '';
                        buttonElement.style.color = '';
                        buttonElement.style.borderColor = '';
                    }, 900);
                }
            } catch (err) {
                console.warn('Clipboard error:', err);
                // Fallback for old browsers or permission issues
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('📎 Đã copy (phương thức dự phòng)', 1500);
                if(buttonElement) {
                    const originalHtml = buttonElement.innerHTML;
                    buttonElement.innerHTML = '✓ Copied!';
                    setTimeout(() => {
                        buttonElement.innerHTML = originalHtml;
                    }, 800);
                }
            }
        }
        
        // Get all copy buttons
        const copyButtons = document.querySelectorAll('.copy-btn');
        copyButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const scriptContent = btn.getAttribute('data-script');
                if(scriptContent) {
                    copyToClipboard(scriptContent, btn);
                } else {
                    showToast('⚠️ Không tìm thấy nội dung script', 1200);
                }
            });
        });
        
        // TikTok button with smooth open
        const tiktokBtn = document.getElementById('tiktokBtn');
        if(tiktokBtn) {
            tiktokBtn.addEventListener('click', () => {
                // Professional TikTok channel (replaceable by user)
                window.open('https://www.tiktok.com/@sigma_hub_pro', '_blank');
                showToast('📱 Đang mở TikTok channel...', 1300);
            });
        }
        
        // Additional micro-interaction: hover ripple effect on cards? just nice to have
        const cards = document.querySelectorAll('.script-card');
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transition = 'all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            });
        });
        
        // optional: handle any missing image or dynamic (all good)
        console.log('Sigma Hub | Pro Light Edition ready — smooth copy & light UI');
        
        // Add additional floating smoothness on load
        window.addEventListener('load', () => {
            document.body.style.opacity = '1';
        });
    })();
</script>
</body>
</html>
